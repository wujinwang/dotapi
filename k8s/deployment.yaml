apiVersion: apps/v1
kind: Deployment
metadata:
  name: dotapi-deployment
  labels:
    app: dotapi
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dotapi
  template:
    metadata:
      labels:
        app: dotapi
    spec:
      containers:
      - name: dotapi-container
        image: wujw2013/dotapi:v1 # Your Docker Hub image
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: dotapi-service
spec:
  selector:
    app: dotapi
  ports:
    - protocol: TCP
      port: 80         # Port accessible inside the cluster
      targetPort: 8080 # Port the container is listening on
  type: NodePort   # Use NodePort if on a local setup like Minikube